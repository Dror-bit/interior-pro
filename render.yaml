services:
  - type: web
    name: interior-pro
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: LIBREDWG_PATH
        value: "/opt/render/libredwg/bin/dwg2dxf"
    plan: free
